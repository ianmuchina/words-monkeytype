name: update stats

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - name: install dependencies
        run: |
          sudo apt-get install -y wget2 jq
          pip install duckdb-cli huggingface_hub

      - name: run
        run: make train.csv
      - name: stats
        run: make inject-stats
      - name: upload-hf
        run: make upload-hf
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: commit
        run: make bot-commit && git push
